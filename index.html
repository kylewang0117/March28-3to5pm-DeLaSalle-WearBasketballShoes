<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Training Schedule</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:40px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
}

.schedule{
  margin-top:30px;
}

.item{
  display:flex;
  gap:20px;
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.time{
  font-weight:bold;
  width:90px;
}

.activity{
  flex:1;
}

.embed{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Training Schedule</h1>

<div class="schedule">

<div class="item">
<div class="time">3:00 PM</div>
<div class="activity">Toss and plyo warm up</div>
</div>

<div class="item">
<div class="time">3:30 PM</div>
<div class="activity">
Square drill

<div class="embed">
<blockquote class="instagram-media"
data-instgrm-permalink="https://www.instagram.com/reel/DVxx7y-Do5k/"
data-instgrm-version="14"></blockquote>
</div>

</div>
</div>

<div class="item">
<div class="time">4:00 PM</div>
<div class="activity">3-man, inside throw practice</div>
</div>

<div class="item">
<div class="time">4:30 PM</div>
<div class="activity">
Under drill

<div class="embed">
<blockquote class="instagram-media"
data-instgrm-permalink="https://www.instagram.com/reel/DV21qo2jRN-/"
data-instgrm-version="14"></blockquote>
</div>
</div>
</div>

<div class="item">
<div class="time">5:00 PM</div>
<div class="activity">End</div>
</div>

</div>

</div>

<script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
